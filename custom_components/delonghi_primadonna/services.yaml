make_beverage:
  name: Prepare beverage
  description: Prepares a beverage. Accepts machine-specific beverage names (from the select entity) or legacy names (espresso, coffee, long, etc.)
  target:
    entity:
      domain: select
  fields:
    entity_id:
      description: "Entity ID of the coffee machine beverage select"
      example: "select.delonghi_beverage"
    beverage:
      name: Beverage
      description: Beverage to prepare (display name or legacy name)
      required: true
      default: "Espresso Coffee"
      example: "Cappuccino"
      selector:
        text:
